<head>

<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0a0a0a; --surface: #141414; --border: #1f1f1f;
  --text: #e7e5e4; --text-dim: #78716c; --text-faint: #57534e;
  --green: #16a34a; --green-glow: rgba(22, 163, 74, 0.12);
}
html { -webkit-font-smoothing: antialiased; }
body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; min-height: 100dvh; overflow: hidden; }

.scene { position: relative; width: 100%; height: 100vh; height: 100dvh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }

/* Animated background grid */
.grid-bg { position: absolute; inset: 0; overflow: hidden; opacity: 0.04; }
.grid-bg::before {
  content: '';
  position: absolute; inset: -50%;
  background-image:
    linear-gradient(var(--green) 1px, transparent 1px),
    linear-gradient(90deg, var(--green) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: drift 30s linear infinite;
}
@keyframes drift { to { transform: translate(60px, 60px); } }

/* Radial glow behind logo */
.glow { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, var(--green-glow), transparent 70%); filter: blur(60px); animation: pulse 4s ease-in-out infinite; }
@keyframes pulse { 0%, 100% { opacity: 0.5; transform: scale(1); } 50% { opacity: 0.8; transform: scale(1.1); } }

.content { position: relative; z-index: 1; text-align: center; max-width: 560px; }

.logo { margin: 0 auto 40px; opacity: 0; animation: fadeUp 1s 0.2s ease-out forwards; }
.logo img { width: clamp(180px, 40vw, 320px); height: auto; }

h1 { font-size: clamp(2.4rem, 6vw, 3.6rem); font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; margin-bottom: 20px; opacity: 0; animation: fadeUp 1s 0.4s ease-out forwards; }
h1 span { color: var(--green); }

.tagline { font-size: clamp(1rem, 2.5vw, 1.15rem); color: var(--text-dim); line-height: 1.7; margin-bottom: 40px; opacity: 0; animation: fadeUp 1s 0.6s ease-out forwards; }

.actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; opacity: 0; animation: fadeUp 1s 0.8s ease-out forwards; }
.btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px; border-radius: 100px; font-size: 0.95rem; font-weight: 600; text-decoration: none; transition: all 0.25s; }
.btn-primary { background: var(--green); color: #fff; border: none; }
.btn-primary:hover { background: #15803d; transform: translateY(-1px); }
.btn-ghost { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--text-dim); color: var(--text); }

.footer { position: absolute; bottom: 32px; left: 0; right: 0; text-align: center; opacity: 0; animation: fadeUp 1s 1s ease-out forwards; }
.footer span { font-size: 0.8rem; color: var(--text-faint); letter-spacing: 0.08em; }
.bar { display: inline-block; width: 40px; height: 2px; background: var(--green); border-radius: 2px; margin-bottom: 8px; opacity: 0.4; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 480px) {
  .glow { width: 280px; height: 280px; }
}
</style>
</head>
<body>
<div class="scene">
  <div class="grid-bg"></div>
  <div class="glow"></div>
  <div class="content">
    <div class="logo"><img src="swale-logo.png" alt="Swale"></div>
    <h1>Coming <span>Soon</span></h1>
    <p class="tagline">Get in touch with us if you want to settle your stormwater.</p>
    <div class="actions">
      <a href="mailto:jack@swale.bio" class="btn btn-primary">Get in Touch</a>
    </div>
  </div>
  <div class="footer">
    <div class="bar"></div><br>
    <span>SEATTLE, WA</span>
  </div>
</div>
</body>
</html>
