<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>swale.bio test</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 560px; margin: 64px auto; padding: 0 16px; }
    input, button { padding: 10px; font-size: 16px; }
    input { width: 100%; margin: 12px 0; }
    .err { color: #b00020; min-height: 1.2em; }
    #content { display: none; margin-top: 24px; }
  </style>
</head>
<body>
  <h1>Test Access</h1>
  <p>Enter password to view test content.</p>
  <input id="pw" type="password" placeholder="Password" />
  <button id="go">Enter</button>
  <div class="err" id="err"></div>

  <div id="content">
    <h2>Preview Area</h2>
    <p>You are in /test.</p>
  </div>

  <script>
    // Obfuscation only, not secure.
    const expected = "swale2026";
    const pw = document.getElementById("pw");
    const err = document.getElementById("err");
    const content = document.getElementById("content");

    function check() {
      if (pw.value === expected) {
        sessionStorage.setItem("swale_test_ok", "1");
        content.style.display = "block";
        pw.style.display = "none";
        document.getElementById("go").style.display = "none";
        err.textContent = "";
      } else {
        err.textContent = "Wrong password.";
      }
    }

    if (sessionStorage.getItem("swale_test_ok") === "1") {
      content.style.display = "block";
      pw.style.display = "none";
      document.getElementById("go").style.display = "none";
    }

    document.getElementById("go").addEventListener("click", check);
    pw.addEventListener("keydown", (e) => { if (e.key === "Enter") check(); });
  </script>
</body>
</html>
