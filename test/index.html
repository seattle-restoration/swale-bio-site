<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>swale.bio - Preview</title>
  <meta name="robots" content="noindex, nofollow">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; background: #0a0a0a; color: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; min-height: 100dvh; }
    .gate { text-align: center; max-width: 360px; padding: 0 24px; }
    .gate h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 8px; color: #e7e5e4; }
    .gate p { font-size: 0.9rem; color: #78716c; margin-bottom: 24px; }
    .gate input { width: 100%; padding: 12px 16px; font-size: 16px; border: 1px solid #3a3a3a; border-radius: 8px; background: #1c1c1c; color: #fafafa; outline: none; }
    .gate input:focus { border-color: #16a34a; }
    .gate button { width: 100%; padding: 12px; font-size: 16px; font-weight: 600; border: none; border-radius: 8px; background: #16a34a; color: #fff; cursor: pointer; margin-top: 12px; }
    .gate button:hover { background: #15803d; }
    .err { color: #dc2626; font-size: 0.85rem; min-height: 1.4em; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="gate" id="gate">
    <h1>Preview Access</h1>
    <p>This site is under development.</p>
    <input id="pw" type="password" placeholder="Password" autofocus>
    <button id="go">Enter</button>
    <div class="err" id="err"></div>
  </div>

  <script>
    const H = "648bad37aab87ba4b22b91c2ff97879e7df414092c39fd91783bebdb07c91e8d";
    async function sha256(s) {
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(s));
      return [...new Uint8Array(buf)].map(b => b.toString(16).padStart(2, "0")).join("");
    }
    async function check() {
      const v = document.getElementById("pw").value;
      const h = await sha256(v);
      if (h === H) {
        sessionStorage.setItem("swale_preview", "1");
        window.location.href = "site.html";
      } else {
        document.getElementById("err").textContent = "Wrong password.";
      }
    }
    if (sessionStorage.getItem("swale_preview") === "1") {
      window.location.href = "site.html";
    }
    document.getElementById("go")?.addEventListener("click", check);
    document.getElementById("pw")?.addEventListener("keydown", e => { if (e.key === "Enter") check(); });
  </script>
</body>
</html>
